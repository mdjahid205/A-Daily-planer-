<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Daily Planner</title>
    <style>
        :root {
            --bg-color: #e5ddd3;
            --card-bg: #f8f4f0;
            --accent: #fdfaf5;
            --text: #333;
        }
        body {
            background-color: var(--bg-color);
            font-family: 'Serif', 'Times New Roman', serif;
            display: flex;
            justify-content: center;
            padding: 10px;
            margin: 0;
        }
        .planner-card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 400px;
            border-radius: 40px;
            padding: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }
        .title h1 { font-size: 32px; margin: 0; font-weight: normal; }
        .days-row { display: flex; gap: 5px; margin-top: 5px; }
        .day-circle {
            width: 22px; height: 22px; border: 1px solid #333;
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 10px;
        }
        .today { background: #333; color: white; }
        
        .date-info { text-align: right; font-size: 12px; }
        .date-box { 
            background: var(--accent); border-radius: 10px; 
            padding: 5px 15px; margin-bottom: 5px; min-width: 80px;
        }

        .main-content { display: flex; gap: 15px; }
        .schedule { flex: 1; }
        .time-slot {
            display: flex; align-items: center; margin-bottom: 8px;
        }
        .time {
            background: var(--accent); border: 1px solid #ccc;
            border-radius: 20px 0 0 20px; padding: 5px 10px;
            font-size: 12px; width: 45px; text-align: center;
        }
        .slot-input {
            border: 1px solid #ccc; border-left: none;
            border-radius: 0 20px 20px 0; flex: 1;
            background: white; padding: 5px; outline: none;
        }

        .side-bar { width: 120px; }
        .side-box {
            background: white; border: 1px solid #ccc;
            border-radius: 20px; padding: 10px; margin-bottom: 15px;
        }
        .side-box h3 { 
            font-size: 12px; text-align: center; margin-top: -18px;
            background: var(--accent); width: fit-content; margin-inline: auto;
            padding: 2px 10px; border-radius: 10px; border: 1px solid #ccc;
        }
        textarea { width: 100%; border: none; resize: none; outline: none; font-size: 11px; }
    </style>
</head>
<body>

<div class="planner-card">
    <div class="header">
        <div class="title">
            <h1>Daily Planner</h1>
            <div class="days-row" id="weekdays">
                <div class="day-circle">S</div><div class="day-circle">M</div>
                <div class="day-circle">T</div><div class="day-circle">W</div>
                <div class="day-circle">T</div><div class="day-circle">F</div>
                <div class="day-circle">S</div>
            </div>
        </div>
        <div class="date-info">
            DAY: <div class="date-box" id="current-day"></div>
            MONTH: <div class="date-box" id="current-month"></div>
        </div>
    </div>

    <div class="main-content">
        <div class="schedule" id="hours">
            </div>

        <div class="side-bar">
            <div class="side-box" style="height: 150px;">
                <h3>NOTE</h3>
                <textarea rows="8"></textarea>
            </div>
            <div class="side-box">
                <h3>TO DO LIST</h3>
                <textarea rows="15"></textarea>
            </div>
        </div>
    </div>
</div>

<script>
    // তারিখ ও মাস অটোমেটিক পরিবর্তন করার কোড
    const now = new Date();
    const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
    const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

    document.getElementById('current-day').innerText = now.getDate();
    document.getElementById('current-month').innerText = months[now.getMonth()];

    // আজকের দিন হাইলাইট করা
    const circles = document.getElementById('weekdays').children;
    circles[now.getDay()].classList.add('today');

    // সময় অনুযায়ী স্লট তৈরি (০৭:০০ থেকে ২১:০০)
    const hoursDiv = document.getElementById('hours');
    for(let i=7; i<=21; i++){
        let timeLabel = i < 10 ? `0${i}.00` : `${i}.00`;
        hoursDiv.innerHTML += `
            <div class="time-slot">
                <div class="time">${timeLabel}</div>
                <input type="text" class="slot-input">
            </div>
        `;
    }
</script>

</body>
</html>
